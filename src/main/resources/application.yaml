spring:
  application:
    name: SmartAirportRidePooling

  datasource:
    url: jdbc:postgresql://localhost:5432/airport_pooling
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  redis:
    host: airport-redis
    port: 6379
    timeout: 1000

    cache:
      type: redis
      redis:
        time-to-live: 600000
        cache-null-values: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true


# ==============================
# ACTUATOR CONFIGURATION
# ==============================

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: smart-airport-ride-pooling
    distribution:
      percentiles-histogram:
        http.server.requests: true

  info:
    env:
      enabled: true


# ==============================
# INFO ENDPOINT DATA
# ==============================

info:
  app:
    name: Smart Airport Ride Pooling
    version: 1.0.0
    description: Airport ride pooling backend service
    developer: Ayush Singh


bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-buckets
      url: /api/**
      strategy: first
      http-status-code: 429
      expression: "#{request.remoteAddr}"   # 🔥 PER-IP KEY
      http-response-body: >
        { "message": "Too many requests from this IP. Please try again later." }
      rate-limits:
        - bandwidths:
            - capacity: 20
              time: 1
              unit: minutes